# Entrypoint workflow for releasing the Android SDK.

name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

      confirm_major:
        description: 'Check to confirm intentional major bump (required when bump_type is major)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  RELEASE_GIT_USER_NAME: "thunderid[bot]"
  RELEASE_GIT_USER_EMAIL: "thunderid[bot]@users.noreply.thunderid.dev"
  JAVA_VERSION: "17"

jobs:
  validate:
    name: ✅ Validate Inputs
    runs-on: ubuntu-latest
    steps:
      - name: Guard against accidental major bump
        if: github.event.inputs.bump_type == 'major' && github.event.inputs.confirm_major != 'true'
        run: |
          echo "❌ bump_type is 'major' but confirm_major is not checked. Enable confirm_major to proceed."
          exit 1

  release:
    name: 🤖 Release android
    needs: [validate]
    if: needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDERID_AUTOMATION_BOT }}

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 🗄️ Cache Gradle Packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🔍 Run ktlint
        run: ./gradlew ktlintCheck

      - name: 🧪 Run Tests
        run: ./gradlew test

      - name: 🔨 Build
        run: ./gradlew build -x test

      - name: 🏷️ Bump Version
        id: bump
        run: |
          current=$(grep -m1 '^version = ' build.gradle.kts | sed -E 's/version = "(.*)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ github.event.inputs.bump_type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new_version="$major.$minor.$patch"
          sed -i "s/version = \"$current\"/version = \"$new_version\"/g" build.gradle.kts
          echo "version=$new_version" >> "$GITHUB_OUTPUT"

      - name: 📤 Commit, Tag & Push
        run: |
          git config user.name "${{ env.RELEASE_GIT_USER_NAME }}"
          git config user.email "${{ env.RELEASE_GIT_USER_EMAIL }}"
          git add build.gradle.kts
          git diff --cached --quiet || git commit -m "[Release] android v${{ steps.bump.outputs.version }}"
          for i in $(seq 1 5); do
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }} && break
            [ "$i" -eq 5 ] && exit 1
            sleep $((i * 3))
          done
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: 🚀 Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.THUNDERID_AUTOMATION_BOT }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "ThunderID Android SDK v${VERSION}" \
            --generate-notes
